name: Bug report
description: Report a problem with subtitle detection, translation, or overlay rendering.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: input
    id: site
    attributes:
      label: Website or video URL
      placeholder: "https://..."
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Enable captions ...
        3. Turn on Apri Video Translate ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: "Chrome 126 / Edge 126"
